<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Sistem Procurement</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #1a56db;
      --primary-h: #1648c0;
      --danger:    #e02424;
      --text:      #111928;
      --muted:     #6b7280;
      --border:    #e5e7eb;
      --bg:        #f3f4f6;
      --white:     #ffffff;
      --radius:    10px;
      --shadow:    0 4px 24px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.75rem;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 24px; height: 24px; fill: white; }
    .logo-text h1 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .logo-text p  { font-size: 0.78rem; color: var(--muted); }

    h2 { font-size: 1.35rem; font-weight: 700; color: var(--text); margin-bottom: .35rem; }
    .subtitle { font-size: .875rem; color: var(--muted); margin-bottom: 1.75rem; }

    label { display: block; font-size: .825rem; font-weight: 600; color: var(--text); margin-bottom: .35rem; }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .925rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
      margin-bottom: 1.1rem;
    }
    input:focus { border-color: var(--primary); }

    .password-wrap { position: relative; }
    .password-wrap input { margin-bottom: 0; padding-right: 2.8rem; }
    .toggle-pw {
      position: absolute; right: .75rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0; font-size: 1rem;
      display: flex; align-items: center;
    }
    .field-gap { margin-bottom: 1.1rem; }

    .btn-login {
      width: 100%;
      padding: .75rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: .975rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: .25rem;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover   { background: var(--primary-h); }
    .btn-login:active  { transform: scale(.98); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      border-radius: var(--radius);
      padding: .65rem .9rem;
      font-size: .85rem;
      margin-bottom: 1.1rem;
      display: none;
    }
    .alert.show { display: block; }

    .divider { text-align: center; color: var(--muted); font-size: .8rem; margin: 1.5rem 0 1.1rem; position: relative; }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .btn-google {
      width: 100%;
      padding: .7rem;
      background: white;
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .925rem;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background .2s, border-color .2s;
    }
    .btn-google:hover { background: var(--bg); border-color: #d1d5db; }
    .btn-google svg { width: 20px; height: 20px; }

    .footer { text-align: center; font-size: .78rem; color: var(--muted); margin-top: 1.75rem; }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zm-9 7H5v-2h6v2zm8 0h-2v-2h2v2zm0-4H5V8h14v2z"/></svg>
    </div>
    <div class="logo-text">
      <h1>SiPro</h1>
      <p>Sistem Procurement Internal</p>
    </div>
  </div>

  <h2>Selamat datang</h2>
  <p class="subtitle">Masuk dengan akun perusahaan Anda</p>

  <div class="alert" id="alert-msg"></div>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="nama@perusahaan.com" autocomplete="email"/>

  <label for="password">Password</label>
  <div class="password-wrap field-gap">
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    <button class="toggle-pw" type="button" onclick="togglePassword()" aria-label="Tampilkan password">
      <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>
    </button>
  </div>

  <button class="btn-login" id="btn-login" onclick="loginEmail()">
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">Masuk</span>
  </button>

  <div class="divider">atau</div>

  <button class="btn-google" onclick="loginGoogle()">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.34-8.16 2.34-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Masuk dengan Google
  </button>

  <p class="footer">Hanya untuk karyawan yang terdaftar &nbsp;·&nbsp; &copy; 2025 SiPro</p>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

// Cek jika sudah login
auth.onAuthStateChanged(async user => {
  if (user) {
    const info = await getCurrentUserInfo();
    if (info) redirectByRole(info.role);
  }
});

function showAlert(msg) {
  const el = document.getElementById('alert-msg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideAlert() { document.getElementById('alert-msg').classList.remove('show'); }

function setLoading(on) {
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btn-text').textContent   = on ? 'Memproses...' : 'Masuk';
  document.getElementById('btn-login').disabled = on;
}

async function loginEmail() {
  hideAlert();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showAlert('Email dan password wajib diisi.'); return; }
  setLoading(true);
  try {
    await auth.signInWithEmailAndPassword(email, password);
    const info = await getCurrentUserInfo();
    redirectByRole(info.role);
  } catch (e) {
    const msg = {
      'auth/user-not-found':  'Email tidak terdaftar.',
      'auth/wrong-password':  'Password salah.',
      'auth/invalid-email':   'Format email tidak valid.',
      'auth/too-many-requests': 'Terlalu banyak percobaan. Coba lagi nanti.',
    };
    showAlert(msg[e.code] || 'Login gagal. Periksa email dan password Anda.');
    setLoading(false);
  }
}

async function loginGoogle() {
  hideAlert();
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
    const info = await getCurrentUserInfo();
    if (!info) { showAlert('Akun Google Anda tidak terdaftar di sistem.'); auth.signOut(); return; }
    redirectByRole(info.role);
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') showAlert('Login Google gagal. Coba lagi.');
  }
}

function togglePassword() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// Enter key untuk login
document.addEventListener('keydown', e => { if (e.key === 'Enter') loginEmail(); });
</script>
</body>
</html>
