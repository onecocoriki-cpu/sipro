<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Sistem Procurement</title>
  <link rel="stylesheet" href="shared-style.css"/>
  <style>
    .login-body { display: flex; align-items: center; justify-content: center; padding: 1rem; min-height: 100vh; }
  </style>
</head>
<body class="login-body">

<noscript>
  <div class="noscript-msg">
    <div class="card">
      <h2>⚠️ JavaScript Diperlukan</h2>
      <p>Browser Anda harus mengaktifkan JavaScript untuk menggunakan SiPro.<br>Hubungi IT support jika membutuhkan bantuan.</p>
    </div>
  </div>
</noscript>

<div class="login-card" id="login-card">
  <div class="login-logo">
    <div class="login-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zm-9 7H5v-2h6v2zm8 0h-2v-2h2v2zm0-4H5V8h14v2z"/></svg>
    </div>
    <div>
      <h1>SiPro</h1>
      <p>Sistem Procurement Internal</p>
    </div>
  </div>

  <h2>Selamat datang</h2>
  <p class="login-subtitle">Masuk dengan akun perusahaan Anda</p>

  <div class="login-alert" id="alert-msg"></div>

  <label class="login-label" for="email">Email</label>
  <input type="email" id="email" class="login-input" placeholder="nama@perusahaan.com" autocomplete="email"/>

  <label class="login-label" for="password">Password</label>
  <div class="password-wrap field-gap">
    <input type="password" id="password" class="login-input" placeholder="••••••••" autocomplete="current-password"/>
    <button class="toggle-pw" type="button" onclick="togglePassword()" aria-label="Tampilkan password">
      <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>
    </button>
  </div>

  <button class="btn-login" id="btn-login" onclick="loginEmail()">
    <div class="spinner" id="spinner" style="display:none;width:18px;height:18px;border-width:2px;"></div>
    <span id="btn-text">Masuk</span>
  </button>

  <div class="login-divider">atau</div>

  <button class="btn-google" onclick="loginGoogle()">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.34-8.16 2.34-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Masuk dengan Google
  </button>

  <p class="login-footer">Hanya untuk karyawan yang terdaftar &nbsp;·&nbsp; &copy; 2025 SiPro</p>
</div>

<div id="offline-bar">📡 Anda sedang offline. Beberapa fitur mungkin tidak tersedia.</div>
<div id="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="shared-utils.js"></script>
<script>

// Cek jika sudah login
auth.onAuthStateChanged(async user => {
  if (user) {
    await ensureUserDoc(); // ← Auto-create users/{uid} jika belum ada
    const info = await getCurrentUserInfo();
    if (info) redirectByRole(info.role);
  }
});

function showAlert(msg) {
  const el = document.getElementById('alert-msg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideAlert() { document.getElementById('alert-msg').classList.remove('show'); }

function setLoading(on) {
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btn-text').textContent   = on ? 'Memproses...' : 'Masuk';
  document.getElementById('btn-login').disabled = on;
}

async function loginEmail() {
  hideAlert();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showAlert('Email dan password wajib diisi.'); return; }
  setLoading(true);
  try {
    await auth.signInWithEmailAndPassword(email, password);
    const info = await getCurrentUserInfo();
    redirectByRole(info.role);
  } catch (e) {
    const msg = {
      'auth/user-not-found':  'Email tidak terdaftar.',
      'auth/wrong-password':  'Password salah.',
      'auth/invalid-email':   'Format email tidak valid.',
      'auth/too-many-requests': 'Terlalu banyak percobaan. Coba lagi nanti.',
      'auth/invalid-credential': 'Email atau password salah.',
    };
    showAlert(msg[e.code] || 'Login gagal. Periksa email dan password Anda.');
    setLoading(false);
  }
}

async function loginGoogle() {
  hideAlert();
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
    const info = await getCurrentUserInfo();
    if (!info) { showAlert('Akun Google Anda tidak terdaftar di sistem.'); auth.signOut(); return; }
    redirectByRole(info.role);
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') showAlert('Login Google gagal. Coba lagi.');
  }
}

function togglePassword() {
  const inp = document.getElementById('password');
  const isVisible = inp.type === 'password';
  inp.type = isVisible ? 'text' : 'password';
  
  const eyeIcon = document.getElementById('eye-icon');
  if (isVisible) {
    // Password sekarang terlihat → tampilkan icon eye-slash
    eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />';
  } else {
    // Password tersembunyi → tampilkan icon eye
    eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
  }
}

// Enter key untuk login
document.addEventListener('keydown', e => { if (e.key === 'Enter') loginEmail(); });
</script>
</body>
</html>
